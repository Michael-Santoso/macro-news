services:
  postgres:
    image: postgres:16-alpine
    container_name: macro-news-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: macro_news
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d macro_news"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
